<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>비밀번호 찾기 - My D-day</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5B6EE1">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="container">
    <div class="text-center mt-24">
      <h1>비밀번호 찾기</h1>
      <p class="text-muted mt-12">가입한 이메일로 재설정 링크를 보내드립니다.</p>
    </div>

    <div class="card mt-24">
      <form id="forgot-form">
        <div class="input-group">
          <label for="email">이메일</label>
          <input type="email" id="email" placeholder="example@email.com" required>
        </div>

        <p id="error-msg" class="error-msg"></p>
        <p id="success-msg" class="text-center mt-12" style="color:var(--color-success);display:none;font-size:0.9rem;"></p>

        <button type="submit" class="btn btn-primary mt-12" id="submit-btn">재설정 링크 보내기</button>
      </form>
    </div>

    <p class="text-center mt-16">
      <a href="login.html" class="link">로그인으로 돌아가기</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script>
    const form = document.getElementById('forgot-form');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('show');
      successMsg.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      if (!email) return;

      submitBtn.disabled = true;
      submitBtn.textContent = '전송 중...';

      try {
        const res = await api.auth.forgotPassword(email);
        successMsg.textContent = res.message || '이메일을 확인해주세요.';
        successMsg.style.display = 'block';
        form.reset();
      } catch (err) {
        errorMsg.textContent = err.error || '요청에 실패했습니다.';
        errorMsg.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '재설정 링크 보내기';
      }
    });
  </script>
</body>
</html>
