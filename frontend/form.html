<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5B6EE1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My D-day">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <title>D-day 추가 - My D-day</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 id="page-title">D-day 추가</h1>
      <a href="index.html" class="btn btn-outline btn-sm">취소</a>
    </div>

    <div class="card">
      <form id="dday-form">
        <div class="input-group">
          <label>유형</label>
          <div class="type-toggle">
            <label class="type-option">
              <input type="radio" name="dday_type" value="fixed" checked>
              <span>일반 D-day</span>
              <small>고정된 미래 날짜</small>
            </label>
            <label class="type-option">
              <input type="radio" name="dday_type" value="milestone">
              <span>마일스톤</span>
              <small>시작일 + 100/200/300일...</small>
            </label>
          </div>
        </div>

        <div class="input-group">
          <label for="title">제목</label>
          <input type="text" id="title" placeholder="예: 철수 생일" maxlength="100" required>
        </div>

        <div class="input-group">
          <label for="category">카테고리</label>
          <select id="category" required>
            <option value="birthday">생일</option>
            <option value="anniversary">기념일</option>
            <option value="couple">커플</option>
            <option value="exam">시험</option>
          </select>
        </div>

        <!-- 일반 D-day -->
        <div class="input-group" id="fixed-fields">
          <label for="target_date">날짜</label>
          <input type="date" id="target_date">
        </div>

        <!-- 마일스톤 -->
        <div id="milestone-fields" style="display: none;">
          <div class="input-group">
            <label for="start_date">시작일</label>
            <input type="date" id="start_date">
            <small class="help-text">예: 사귀기 시작한 날, 다이어트 시작한 날</small>
          </div>

          <div class="input-group">
            <label>마일스톤 (며칠째)</label>
            <div class="milestone-presets" id="milestone-presets">
              <label><input type="checkbox" value="100" checked> 100일</label>
              <label><input type="checkbox" value="200" checked> 200일</label>
              <label><input type="checkbox" value="300" checked> 300일</label>
              <label><input type="checkbox" value="365" checked> 1년 (365일)</label>
              <label><input type="checkbox" value="500" checked> 500일</label>
              <label><input type="checkbox" value="730"> 2년 (730일)</label>
              <label><input type="checkbox" value="1000" checked> 1000일</label>
            </div>
          </div>

          <div class="input-group">
            <label for="custom-days">커스텀 추가 (쉼표로 구분)</label>
            <input type="text" id="custom-days" placeholder="예: 777, 1234">
          </div>
        </div>

        <div class="input-group">
          <label for="memo">메모 (선택)</label>
          <textarea id="memo" maxlength="1000" rows="3" placeholder="예: 선물 아이디어, 계획, 메시지 등" style="width:100%;padding:12px 14px;border:1px solid var(--color-border);border-radius:var(--radius-sm);font-size:0.95rem;font-family:inherit;resize:vertical;"></textarea>
          <small class="help-text">최대 1000자</small>
        </div>

        <p id="error-msg" class="error-msg"></p>

        <button type="submit" class="btn btn-primary mt-12" id="submit-btn">저장</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
