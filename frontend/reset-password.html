<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>비밀번호 재설정 - My D-day</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5B6EE1">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="container">
    <div class="text-center mt-24">
      <h1>비밀번호 재설정</h1>
      <p class="text-muted mt-12">새 비밀번호를 입력해주세요.</p>
    </div>

    <div class="card mt-24">
      <form id="reset-form">
        <div class="input-group">
          <label for="password">새 비밀번호</label>
          <input type="password" id="password" placeholder="8자 이상" minlength="8" required>
        </div>

        <div class="input-group">
          <label for="password-confirm">새 비밀번호 확인</label>
          <input type="password" id="password-confirm" placeholder="다시 입력" minlength="8" required>
        </div>

        <p id="error-msg" class="error-msg"></p>

        <button type="submit" class="btn btn-primary mt-12" id="submit-btn">비밀번호 변경</button>
      </form>
    </div>

    <p class="text-center mt-16">
      <a href="login.html" class="link">로그인으로 돌아가기</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    const form = document.getElementById('reset-form');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }

    if (!token) {
      showError('유효하지 않은 링크입니다.');
      submitBtn.disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('show');

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('password-confirm').value;

      if (password.length < 8) return showError('비밀번호는 최소 8자 이상이어야 합니다.');
      if (password !== confirm) return showError('비밀번호가 일치하지 않습니다.');

      submitBtn.disabled = true;
      submitBtn.textContent = '변경 중...';

      try {
        await api.auth.resetPassword(token, password);
        alert('비밀번호가 변경되었습니다. 새 비밀번호로 로그인해주세요.');
        window.location.href = 'login.html';
      } catch (err) {
        showError(err.error || '재설정에 실패했습니다.');
        submitBtn.disabled = false;
        submitBtn.textContent = '비밀번호 변경';
      }
    });
  </script>
</body>
</html>
