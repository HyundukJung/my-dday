<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My D-day</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5B6EE1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My D-day">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .filter-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 16px;
      padding-bottom: 4px;
    }
    .filter-tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      background: var(--color-surface);
      transition: all 0.2s;
    }
    .filter-tab.active {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }

    .dday-card {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 12px;
    }
    .dday-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .dday-category {
      font-size: 1.2rem;
    }
    .dday-title {
      font-weight: 600;
      font-size: 1rem;
    }
    .dday-count {
      font-size: 1.6rem;
      font-weight: 800;
      margin: 8px 0;
    }
    .dday-count.today { color: var(--color-success); }
    .dday-count.future { color: var(--color-primary); }
    .dday-count.past { color: var(--color-text-muted); opacity: 0.7; }
    .dday-date {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }
    .dday-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 48px 0;
      color: var(--color-text-muted);
    }
    .empty-state p {
      font-size: 0.95rem;
      margin-top: 8px;
    }

    .logout-btn {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    /* 공유 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show {
      display: flex;
    }
    .modal {
      background: var(--color-surface);
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 360px;
    }
    .modal h2 {
      font-size: 1.1rem;
      margin-bottom: 16px;
    }
    .theme-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .theme-option {
      padding: 12px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-sm);
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .theme-option.selected {
      border-color: var(--color-primary);
    }
    .theme-option span {
      display: block;
      font-size: 1.5rem;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>My D-day</h1>
      <div style="display:flex;gap:12px;align-items:center;">
        <a href="form.html" class="btn btn-primary btn-sm">+ 추가</a>
        <a href="account.html" class="logout-btn" style="text-decoration:none;">계정</a>
        <button class="logout-btn" id="logout-btn">로그아웃</button>
      </div>
    </div>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-filter="all">전체</button>
      <button class="filter-tab" data-filter="birthday">생일</button>
      <button class="filter-tab" data-filter="anniversary">기념일</button>
      <button class="filter-tab" data-filter="couple">커플</button>
      <button class="filter-tab" data-filter="exam">시험</button>
    </div>

    <div id="dday-list"></div>
  </div>

  <!-- 공유 테마 선택 모달 -->
  <div class="modal-overlay" id="share-modal">
    <div class="modal">
      <h2>공유 테마 선택</h2>
      <div class="theme-options" id="theme-options">
        <div class="theme-option selected" data-theme="birthday">
          <span>&#127874;</span>생일
        </div>
        <div class="theme-option" data-theme="anniversary">
          <span>&#128149;</span>기념일
        </div>
        <div class="theme-option" data-theme="couple">
          <span>&#128145;</span>커플
        </div>
        <div class="theme-option" data-theme="exam">
          <span>&#128218;</span>시험
        </div>
      </div>
      <button class="btn btn-primary" id="share-confirm-btn">공유 링크 생성</button>
      <button class="btn btn-outline mt-12" id="share-cancel-btn" style="width:100%;">취소</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ddays.js"></script>
</body>
</html>
