<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>로그인 - My D-day</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5B6EE1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My D-day">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="container">
    <div class="text-center mt-24">
      <h1>My D-day</h1>
      <p class="text-muted mt-12">소중한 날을 세어보세요</p>
    </div>

    <div class="card mt-24">
      <form id="login-form">
        <div class="input-group">
          <label for="email">이메일</label>
          <input type="email" id="email" placeholder="example@email.com" required>
        </div>

        <div class="input-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" placeholder="8자 이상" required>
        </div>

        <p id="error-msg" class="error-msg"></p>

        <button type="submit" class="btn btn-primary mt-12" id="submit-btn">로그인</button>
      </form>
    </div>

    <p class="text-center mt-16">
      계정이 없으신가요? <a href="signup.html" class="link">회원가입</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
